<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c0c4d0;font:13px/1.4 system-ui,sans-serif;padding:10px 10px 12px}
html,body{height:auto}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.panel{border-radius:6px;border:1px solid #1e2533;padding:10px 12px;background:#111820;min-height:160px}
.panel.curr{border-color:#c9a84c;background:#111c12}
.panel.faded{opacity:.65}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.07em;color:#6a8aaa;text-transform:uppercase;margin-bottom:7px}
.panel.curr .panel-title{color:#c9a84c}

.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.pill{background:#1a2a3a;border:1px solid #2a3f56;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;color:#8aaed0}
.pill.new{background:#c9a84c;border-color:#c9a84c;color:#0d1117}
.pill.more{background:#111820;border-color:#1e2533;color:#4a6070;font-style:italic}

.formula{font-size:11px;color:#8aaed0;margin-bottom:6px;line-height:1.6}
.formula strong{color:#c9a84c}
.formula .fv{color:#d0e4f4;font-weight:600}
.new-primes-line{font-size:11px;margin-bottom:6px;color:#8aaed0}
.new-primes-line span{color:#c9a84c;font-weight:700}
.next-range-line{font-size:10px;color:#6a8aaa;margin-bottom:7px}
.next-range-line strong{color:#90b8e0}

.bar-wrap{margin-top:4px}
.bar-track{height:12px;border-radius:3px;overflow:hidden;display:flex;position:relative;width:240px}
.bar-gray{background:#1e2d3d;flex-shrink:0}
.bar-blue{background:#2d7dd2;flex:1}
.bar-marker{position:absolute;top:0;bottom:0;width:2px;background:#c9a84c}
.bar-labels{display:flex;font-size:9px;color:#5a7a9a;margin-top:3px;position:relative;height:13px;width:240px}
.bar-lbl{position:absolute;transform:translateX(-50%);white-space:nowrap}
.bar-lbl.l0{transform:none}
.bar-lbl.lmax{transform:translateX(-100%)}

.growth{display:inline-block;background:#1a2a3a;border:1px solid #2d7dd2;border-radius:4px;
  font-size:10px;color:#8aaed0;padding:2px 7px;margin-top:6px}
.growth strong{color:#c9a84c}

/* Nav */
.nav{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.nav-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;
  color:#c0c4d0;font-size:15px;width:34px;height:34px;cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;display:flex;align-items:center;justify-content:center;
  flex-shrink:0}
.nav-btn:hover:not(:disabled){background:rgba(201,168,76,.15);border-color:#c9a84c;color:#c9a84c}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-btn.active-play{background:rgba(201,168,76,.2);border-color:#c9a84c;color:#c9a84c}
.step-info{font-size:12px;color:#6a8aaa;min-width:76px;text-align:center}

@media(max-width:500px){
  .panels{grid-template-columns:1fr}
  .panel.faded{display:none}
}
</style>
</head>
<body>

<div class="panels">
  <div class="panel faded" id="panel-prev"></div>
  <div class="panel curr"  id="panel-curr"></div>
</div>
<div class="nav">
  <button class="nav-btn" id="btn-reset"  title="Reset">&#8676;</button>
  <button class="nav-btn" id="btn-prev"   title="Prev">&#8592;</button>
  <button class="nav-btn" id="btn-rev"    title="Play reverse">&#9664;&#9664;</button>
  <button class="nav-btn" id="btn-play"   title="Play forward">&#9654;</button>
  <button class="nav-btn" id="btn-next"   title="Next">&#8594;</button>
  <span class="step-info" id="step-info"></span>
</div>

<script>
/* ── Build steps: each step finds ALL primes in (P_max, 2×P_max] ── */
function buildSteps(){
  const LIMIT = 2000000;
  const isp = new Uint8Array(LIMIT+1).fill(1); isp[0]=isp[1]=0;
  for(let i=2;i*i<=LIMIT;i++) if(isp[i]) for(let j=i*i;j<=LIMIT;j+=i) isp[j]=0;

  const steps=[];
  let pMax=2, basis=[2];
  steps.push({pMax:2,range:4,newPrimes:[],basis:[2],prevPMax:null,foundIn:4});

  for(let k=0;k<50;k++){
    const lo=pMax, hi=2*pMax;
    if(hi>LIMIT) break;
    const found=[];
    for(let n=lo+1;n<=hi;n++) if(isp[n]) found.push(n);
    if(!found.length) break;
    const prev=pMax;
    pMax=found[found.length-1];
    basis=[...basis,...found];
    steps.push({prevPMax:prev,foundIn:hi,newPrimes:found,pMax,range:2*pMax,basis:[...basis]});
  }
  return steps;
}

const STEPS = buildSteps();
const MAX_STEP = STEPS.length - 1;
let step = 1;
// playDir: 0=stopped, 1=forward, -1=reverse
let playDir = 0;
let playTimer = null;

function getLang(){
  try{ return window.parent.document.documentElement.lang||'en'; }catch(e){ return 'en'; }
}

/* ── Pill display with truncation ── */
function pillsHTML(basis, newSet, isCurr){
  const MAX_EXISTING = 14;
  const existing = basis.filter(p=>!newSet.has(p));
  let out = '';
  if(existing.length <= MAX_EXISTING){
    existing.forEach(p=>{ out+=`<span class="pill">${p}</span>`; });
  } else {
    existing.slice(0,6).forEach(p=>{ out+=`<span class="pill">${p}</span>`; });
    out+=`<span class="pill more">+${existing.length-6} …</span>`;
  }
  newSet.forEach(p=>{ out+=`<span class="pill${isCurr?' new':''}">${p}</span>`; });
  return out;
}

/* ── Bar ── */
function renderBar(el, foundIn, prevPMax, newPrimes){
  const W=240;
  const gw=Math.round(prevPMax/foundIn*W);
  let markers='';
  newPrimes.forEach(p=>{
    const x=Math.round(p/foundIn*W);
    markers+=`<div class="bar-marker" style="left:${x}px"></div>`;
  });
  el.innerHTML=
    `<div class="bar-wrap">`+
      `<div style="position:relative;width:${W}px">`+
        `<div class="bar-track">`+
          `<div class="bar-gray" style="width:${gw}px"></div>`+
          `<div class="bar-blue" style="flex:1"></div>`+
        `</div>`+
        markers+
      `</div>`+
      `<div class="bar-labels">`+
        `<span class="bar-lbl l0">0</span>`+
        `<span class="bar-lbl" style="left:${gw}px">${prevPMax}</span>`+
        `<span class="bar-lbl lmax" style="left:${W}px">${foundIn}</span>`+
      `</div>`+
    `</div>`;
}

/* ── Panel render ── */
function renderPanel(el, k, isCurr){
  const s=STEPS[k];
  if(!s){el.innerHTML='';return;}
  const isPL=getLang()==='pl';
  const kLabel=k===0?(isPL?'START':'START'):`${isPL?'KROK':'STEP'} ${k}`;

  const newSet=new Set(s.newPrimes);
  let html=`<div class="panel-title">${kLabel}</div>`+
    `<div class="pills">${pillsHTML(s.basis,newSet,isCurr)}</div>`;

  if(k===0){
    html+=`<div class="formula">${isPL?'Zasięg startowy':'Initial range'}: <span class="fv">2 × 2 = <strong>4</strong></span></div>`;
    el.innerHTML=html;
    const bd=document.createElement('div');
    renderBar(bd,4,2,[]);
    el.appendChild(bd);
    return;
  }

  const {prevPMax,foundIn,newPrimes,pMax,range}=s;
  const nLabel=isPL?'Nowe pierwsze':'New primes';
  const nrLabel=isPL?'Nowy zasięg':'New range';
  const cnt=newPrimes.length;
  const cLabel=isPL
    ?`+<strong>${cnt}</strong> now${cnt===1?'a':'e'}`
    :`+<strong>${cnt}</strong> new`;

  html+=
    `<div class="formula">2 × P<sub>max</sub> = 2 × <span class="fv">${prevPMax.toLocaleString()}</span> = <strong>${foundIn.toLocaleString()}</strong></div>`+
    `<div class="new-primes-line">${nLabel}: `+
      (newPrimes.length<=12
        ? newPrimes.map(p=>`<span>${p.toLocaleString()}</span>`).join(' · ')
        : newPrimes.slice(0,5).map(p=>`<span>${p}</span>`).join(' · ')+
          ` <span style="color:#4a6070">… +${newPrimes.length-5}</span>`)+
    `</div>`+
    `<div class="next-range-line">${nrLabel}: 2 × <strong>${pMax.toLocaleString()}</strong> = <strong>${range.toLocaleString()}</strong></div>`+
    `<div class="growth">${cLabel}</div>`;

  el.innerHTML=html;
  const bd=document.createElement('div');
  renderBar(bd,foundIn,prevPMax,newPrimes);
  el.appendChild(bd);
}

/* ── Nav state ── */
function render(scroll){
  const isPL=getLang()==='pl';
  renderPanel(document.getElementById('panel-prev'),step-1,false);
  renderPanel(document.getElementById('panel-curr'),step,true);
  document.getElementById('btn-prev').disabled=step<=1;
  document.getElementById('btn-next').disabled=step>=MAX_STEP;
  document.getElementById('btn-reset').disabled=step<=1;
  document.getElementById('step-info').textContent=`${isPL?'krok':'step'} ${step} / ${MAX_STEP}`;
  document.getElementById('btn-play').classList.toggle('active-play',playDir===1);
  document.getElementById('btn-rev').classList.toggle('active-play',playDir===-1);
  document.getElementById('btn-play').innerHTML=playDir===1?'&#9646;&#9646;':'&#9654;';
  document.getElementById('btn-rev').innerHTML=playDir===-1?'&#9646;&#9646;':'&#9664;';
  fitParent(scroll);
}

function stopPlay(){
  clearInterval(playTimer); playTimer=null; playDir=0;
}
function startPlay(dir){
  stopPlay();
  if(dir===1 && step>=MAX_STEP) step=1;
  if(dir===-1 && step<=1) step=MAX_STEP;
  playDir=dir;
  playTimer=setInterval(()=>{
    step+=dir;
    if(step>=MAX_STEP&&dir===1){ step=MAX_STEP; stopPlay(); }
    else if(step<=1&&dir===-1){ step=1; stopPlay(); }
    render(true);
  },1200);
  render(true);
}

document.getElementById('btn-play').addEventListener('click',()=>{
  playDir===1?(stopPlay(),render(false)):startPlay(1);
});
document.getElementById('btn-rev').addEventListener('click',()=>{
  playDir===-1?(stopPlay(),render(false)):startPlay(-1);
});
document.getElementById('btn-prev').addEventListener('click',()=>{ stopPlay(); if(step>1){step--;render(true);} });
document.getElementById('btn-next').addEventListener('click',()=>{ stopPlay(); if(step<MAX_STEP){step++;render(true);} });
document.getElementById('btn-reset').addEventListener('click',()=>{ stopPlay(); step=1; render(true); });

function fitParent(scroll){
  if(!window.frameElement)return;
  const h=document.documentElement.scrollHeight;
  requestAnimationFrame(()=>{
    window.frameElement.style.height=h+'px';
    if(!scroll)return;
    // Scroll parent so iframe bottom sits just above the sticky nav bar (56px)
    const pWin=window.parent;
    const STICKY=56+8; // sticky bar height + small margin
    // Walk offsetParent chain to get iframe's absolute top in parent document
    let top=0, el=window.frameElement;
    while(el){top+=el.offsetTop||0; el=el.offsetParent;}
    const iframeBottom=top+h;
    const targetScroll=iframeBottom-(pWin.innerHeight-STICKY);
    if(targetScroll>pWin.scrollY){
      pWin.scrollTo({top:targetScroll,behavior:'smooth'});
    }
  });
}

render();
try{
  new MutationObserver(()=>render())
    .observe(window.parent.document.documentElement,{attributes:true,attributeFilter:['lang']});
}catch(e){}
</script>
</body>
</html>
