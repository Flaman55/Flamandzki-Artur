<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c0c4d0;font:13px/1.4 system-ui,sans-serif;padding:10px 10px 12px}
html,body{height:auto}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.panel{border-radius:6px;border:1px solid #1e2533;padding:10px 12px;background:#111820;min-height:160px}
.panel.curr{border-color:#c9a84c;background:#111c12}
.panel.faded{opacity:.4}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.07em;color:#6a8aaa;text-transform:uppercase;margin-bottom:7px}
.panel.curr .panel-title{color:#c9a84c}

.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.pill{background:#1a2a3a;border:1px solid #2a3f56;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;color:#8aaed0}
.pill.new{background:#c9a84c;border-color:#c9a84c;color:#0d1117}

.formula{font-size:11px;color:#8aaed0;margin-bottom:7px;line-height:1.6}
.formula strong{color:#c9a84c}
.formula .fv{color:#d0e4f4;font-weight:600}
.new-primes-line{font-size:11px;margin-bottom:7px;color:#8aaed0}
.new-primes-line span{color:#c9a84c;font-weight:700}
.next-range-line{font-size:10px;color:#6a8aaa;margin-bottom:7px}
.next-range-line strong{color:#90b8e0}

/* Bar */
.bar-wrap{position:relative;padding-top:0;margin-top:2px}
.bar-track{height:12px;border-radius:3px;overflow:hidden;display:flex;position:relative}
.bar-gray{background:#1e2d3d;flex-shrink:0}
.bar-blue{background:#2d7dd2;flex:1}
.bar-marker{position:absolute;top:0;bottom:0;width:2px;background:#c9a84c}
.bar-labels{display:flex;font-size:9px;color:#5a7a9a;margin-top:3px;position:relative;height:14px}
.bar-lbl{position:absolute;transform:translateX(-50%);white-space:nowrap}
.bar-lbl.right{transform:translateX(-100%)}
.bar-lbl.left{transform:none}

/* Nav */
.nav{display:flex;align-items:center;justify-content:center;gap:12px}
.nav-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;
  color:#c0c4d0;font-size:16px;width:34px;height:34px;cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover:not(:disabled){background:rgba(201,168,76,.15);border-color:#c9a84c;color:#c9a84c}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-play{width:42px;font-size:18px}
.step-info{font-size:12px;color:#6a8aaa;min-width:72px;text-align:center}

/* Growth badge */
.growth{display:inline-block;background:#1a2a3a;border:1px solid #2d7dd2;border-radius:4px;
  font-size:10px;color:#8aaed0;padding:2px 7px;margin-top:5px}
.growth strong{color:#c9a84c}

@media(max-width:500px){
  .panels{grid-template-columns:1fr}
  .panel.faded{display:none}
}
</style>
</head>
<body>

<div class="panels">
  <div class="panel faded" id="panel-prev"></div>
  <div class="panel curr"  id="panel-curr"></div>
</div>
<div class="nav">
  <button class="nav-btn" id="btn-prev">&#8592;</button>
  <button class="nav-btn nav-play" id="btn-play">&#9654;</button>
  <button class="nav-btn" id="btn-next">&#8594;</button>
  <span class="step-info" id="step-info"></span>
</div>

<script>
/* ── Algorithm: generate steps ──────────────────────────────────
   Each step finds ALL primes in (P_max, 2×P_max].
   New P_max = largest found. Next search window doubles from there.
─────────────────────────────────────────────────────────────────*/
function buildSteps(){
  const LIMIT = 400;
  const isp = new Uint8Array(LIMIT+1).fill(1); isp[0]=isp[1]=0;
  for(let i=2;i*i<=LIMIT;i++) if(isp[i]) for(let j=i*i;j<=LIMIT;j+=i) isp[j]=0;

  const steps = [];
  let pMax = 2;
  let basis = [2];

  // Step 0: initial state
  steps.push({ pMax:2, range:4, newPrimes:[], basis:[2], prevPMax:null });

  for(let k=0; k<7; k++){
    const lo = pMax, hi = 2*pMax;
    if(hi > LIMIT) break;
    const found = [];
    for(let n=lo+1; n<=hi; n++) if(isp[n]) found.push(n);
    if(!found.length) break;

    const prevPMax = pMax;
    pMax = found[found.length-1];
    basis = [...basis, ...found];
    steps.push({ prevPMax, foundIn: hi, newPrimes: found, pMax, range: 2*pMax, basis:[...basis] });
  }
  return steps;
}

const STEPS = buildSteps();
const MAX_STEP = STEPS.length - 1;
let step = 1;
let playTimer = null;

function getLang(){
  try{ return window.parent.document.documentElement.lang||'en'; }catch(e){ return 'en'; }
}

function renderBar(container, foundIn, prevPMax, newPrimes){
  const W = 240;
  const grayW = Math.round(prevPMax / foundIn * W);
  const blueW = W - grayW;

  let markers = '';
  newPrimes.forEach(p=>{
    const x = Math.round(p / foundIn * W);
    markers += `<div class="bar-marker" style="left:${x}px"></div>`;
  });

  const lblPrev = prevPMax;
  const lblMax  = foundIn;

  container.innerHTML =
    `<div class="bar-wrap">` +
      `<div style="position:relative;width:${W}px">` +
        `<div class="bar-track" style="width:${W}px">` +
          `<div class="bar-gray" style="width:${grayW}px"></div>` +
          `<div class="bar-blue" style="width:${blueW}px"></div>` +
        `</div>` +
        markers +
      `</div>` +
      `<div class="bar-labels" style="width:${W}px">` +
        `<span class="bar-lbl left">0</span>` +
        `<span class="bar-lbl" style="left:${grayW}px">${lblPrev}</span>` +
        `<span class="bar-lbl right" style="left:${W}px">${lblMax}</span>` +
      `</div>` +
    `</div>`;
}

function renderPanel(el, k, isCurr){
  const s = STEPS[k];
  if(!s){ el.innerHTML=''; return; }
  const isPL = getLang()==='pl';

  // Title
  const title = k===0
    ? (isPL?'START':'START')
    : `${isPL?'KROK':'STEP'} ${k}`;

  // Pills
  const pills = s.basis.map(p=>{
    const isNew = s.newPrimes.includes(p);
    return `<span class="pill${isCurr&&isNew?' new':''}">${p}</span>`;
  }).join('');

  let body = `<div class="panel-title">${title}</div><div class="pills">${pills}</div>`;

  if(k===0){
    // Initial state
    const fl = isPL?'Zasięg startowy':'Initial range';
    body +=
      `<div class="formula">${fl}: <span class="fv">2 × 2 = 4</span></div>`;
    renderBar(el, 4, 2, []);
    el.innerHTML = body;
    el.querySelector('.bar-wrap') && (el.innerHTML += '');
    // reattach bar
    const tmp = document.createElement('div');
    renderBar(tmp, 4, 2, []);
    el.innerHTML = body + tmp.innerHTML;
    return;
  }

  const { prevPMax, foundIn, newPrimes, pMax, range } = s;
  const nLabel = isPL ? 'Nowe pierwsze' : 'New primes';
  const nrLabel = isPL ? 'Nowy zasięg' : 'New range';

  const formulaLine =
    `<div class="formula">` +
      `2 × P<sub>max</sub> = 2 × <span class="fv">${prevPMax}</span> = <strong>${foundIn}</strong>` +
    `</div>`;

  const newLine =
    `<div class="new-primes-line">${nLabel}: ` +
      newPrimes.map(p=>`<span>${p}</span>`).join(' · ') +
    `</div>`;

  const nextLine =
    `<div class="next-range-line">${nrLabel}: 2 × <strong>${pMax}</strong> = <strong>${range}</strong></div>`;

  body += formulaLine + newLine + nextLine;

  // Badge: how many new primes
  const cnt = newPrimes.length;
  const cntLabel = isPL
    ? `+<strong>${cnt}</strong> now${cnt===1?'a':'e'} ${cnt===1?'pierwsza':'pierwsze'}`
    : `+<strong>${cnt}</strong> new prime${cnt===1?'':'s'}`;
  body += `<div class="growth">${cntLabel}</div>`;

  el.innerHTML = body;

  const barEl = document.createElement('div');
  renderBar(barEl, foundIn, prevPMax, newPrimes);
  el.appendChild(barEl);
}

function render(){
  const isPL = getLang()==='pl';
  renderPanel(document.getElementById('panel-prev'), step-1, false);
  renderPanel(document.getElementById('panel-curr'), step,   true);
  document.getElementById('btn-prev').disabled = step <= 1;
  document.getElementById('btn-next').disabled = step >= MAX_STEP;
  document.getElementById('step-info').textContent =
    `${isPL?'krok':'step'} ${step} / ${MAX_STEP}`;
  fitParent();
}

const playBtn = document.getElementById('btn-play');
function stopPlay(){ clearInterval(playTimer); playTimer=null; playBtn.innerHTML='&#9654;'; }
function startPlay(){
  if(step>=MAX_STEP) step=1;
  playBtn.innerHTML='&#9646;&#9646;';
  playTimer=setInterval(()=>{ if(step>=MAX_STEP){ stopPlay(); return; } step++; render(); }, 1400);
}
playBtn.addEventListener('click',()=>{ playTimer?stopPlay():startPlay(); });
document.getElementById('btn-prev').addEventListener('click',()=>{ if(step>1){ step--; render(); } });
document.getElementById('btn-next').addEventListener('click',()=>{ if(step<MAX_STEP){ step++; render(); } });

function fitParent(){
  if(!window.frameElement) return;
  requestAnimationFrame(()=>{
    window.frameElement.style.height = document.documentElement.scrollHeight + 'px';
  });
}

render();
try{
  new MutationObserver(()=>{ render(); })
    .observe(window.parent.document.documentElement,{attributes:true,attributeFilter:['lang']});
}catch(e){}
</script>
</body>
</html>
